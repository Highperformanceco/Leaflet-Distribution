<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Leaflet Distribution | Agent Entry Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .form-card {
            background: white;
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { color: #6B7280; font-size: 0.85rem; margin-top: 5px; }
        .target-badge {
            background: #F3F4F6;
            padding: 8px 15px;
            border-radius: 40px;
            display: inline-flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .target-badge span { font-size: 0.8rem; font-weight: 500; color: #374151; }
        .target-badge strong { color: #667eea; font-size: 1rem; }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #6B7280;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: white;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        /* Searchable dropdown styles */
        .searchable-dropdown {
            position: relative;
        }
        .searchable-dropdown input {
            cursor: pointer;
            background: white;
        }
        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #E5E7EB;
            border-top: none;
            border-radius: 0 0 16px 16px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .dropdown-list.show { display: block; }
        .dropdown-search {
            padding: 10px;
            border-bottom: 1px solid #E5E7EB;
        }
        .dropdown-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        .dropdown-option {
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .dropdown-option:hover {
            background: #F3F4F6;
        }
        .row-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .submit-btn:hover { transform: translateY(-2px); }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: #D1FAE5;
            color: #065F46;
            display: block;
        }
        .message.error {
            background: #FEE2E2;
            color: #991B1B;
            display: block;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="header">
                <h1>📋 Leaflet Distribution</h1>
                <p>Agent Daily Entry Form</p>
            </div>

            <div style="text-align: center; margin-bottom: 20px;">
                <div class="target-badge">
                    <span>🎯 Target:</span>
                    <span><strong>10</strong> Visits</span>
                    <span><strong>10</strong> KYC</span>
                </div>
            </div>

            <form id="entryForm">
                <div class="form-group">
                    <label>👤 AGENT NAME</label>
                    <select id="agentName" required>
                        <option value="">Select Agent</option>
                    </select>
                </div>

                <div class="row-2col">
                    <div class="form-group searchable-dropdown">
                        <label>📍 ZONE</label>
                        <input type="text" id="zoneInput" placeholder="Select or search zone..." readonly>
                        <div id="zoneDropdown" class="dropdown-list">
                            <div class="dropdown-search"><input type="text" id="zoneSearch" placeholder="Search zone..."></div>
                            <div id="zoneOptions"></div>
                        </div>
                        <input type="hidden" id="zone" name="zone">
                    </div>

                    <div class="form-group searchable-dropdown">
                        <label>🏙️ CITY</label>
                        <input type="text" id="cityInput" placeholder="Select or search city..." readonly>
                        <div id="cityDropdown" class="dropdown-list">
                            <div class="dropdown-search"><input type="text" id="citySearch" placeholder="Search city..."></div>
                            <div id="cityOptions"></div>
                        </div>
                        <input type="hidden" id="city" name="city">
                    </div>
                </div>

                <div class="form-group">
                    <label>📅 DATE</label>
                    <input type="date" id="date" required>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>🏪 PLACES VISITED</label>
                        <input type="number" id="visited" min="0" value="0" required>
                    </div>
                    <div class="form-group">
                        <label>📄 LEAFLETS</label>
                        <input type="number" id="leaflets" min="0" value="0" required>
                    </div>
                </div>

                <div class="row-2col">
                    <div class="form-group">
                        <label>🚪 OPENED DOOR</label>
                        <input type="number" id="opened" min="0" value="0" required>
                    </div>
                    <div class="form-group">
                        <label>🚫 DIDN'T OPEN</label>
                        <input type="number" id="notOpened" min="0" value="0" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>✅ KYC COMPLETED</label>
                    <input type="number" id="kyc" min="0" value="0" required>
                </div>

                <div class="form-group">
                    <label>📝 NOTES (OPTIONAL)</label>
                    <textarea id="notes" rows="2" placeholder="Any observations..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">📤 Submit Entry</button>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwm7pRkt727A9_CalLfjCg_i95LFDVYnHA4MamB5a5JBpNz3GGUTfFRrWCK0wgxOIVI-g/exec';
        
        let agentsList = [];
        let zonesList = [];
        let citiesList = [];

        // Initialize searchable dropdowns
        function initSearchableDropdown(inputId, dropdownId, searchId, optionsId, hiddenId, itemsList, placeholderText) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            const search = document.getElementById(searchId);
            const optionsContainer = document.getElementById(optionsId);
            const hidden = document.getElementById(hiddenId);
            
            // Show dropdown on input click
            input.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
                if (dropdown.classList.contains('show')) {
                    search.value = '';
                    renderOptions(itemsList);
                    search.focus();
                }
            });
            
            // Search filter
            search.addEventListener('input', () => {
                const filtered = itemsList.filter(item => 
                    item.toLowerCase().includes(search.value.toLowerCase())
                );
                renderOptions(filtered);
            });
            
            function renderOptions(items) {
                optionsContainer.innerHTML = '';
                if (items.length === 0) {
                    const div = document.createElement('div');
                    div.className = 'dropdown-option';
                    div.textContent = 'No options found';
                    optionsContainer.appendChild(div);
                } else {
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'dropdown-option';
                        div.textContent = item;
                        div.onclick = () => {
                            input.value = item;
                            hidden.value = item;
                            dropdown.classList.remove('show');
                        };
                        optionsContainer.appendChild(div);
                    });
                }
            }
            
            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('show');
                }
            });
        }

        async function loadData() {
            try {
                // Load agents
                const agentsResponse = await fetch(`${APPS_SCRIPT_URL}?action=getAgents`);
                const agents = await agentsResponse.json();
                agentsList = agents.map(a => a.name).filter(n => n);
                
                // Load zones
                const zonesResponse = await fetch(`${APPS_SCRIPT_URL}?action=getZones`);
                zonesList = await zonesResponse.json();
                
                // Load cities
                const citiesResponse = await fetch(`${APPS_SCRIPT_URL}?action=getCities`);
                citiesList = await citiesResponse.json();
                
                // Populate agent select
                const agentSelect = document.getElementById('agentName');
                agentSelect.innerHTML = '<option value="">Select Agent</option>';
                agentsList.forEach(agent => {
                    const option = document.createElement('option');
                    option.value = agent;
                    option.textContent = agent;
                    agentSelect.appendChild(option);
                });
                
                // Initialize searchable dropdowns
                initSearchableDropdown('zoneInput', 'zoneDropdown', 'zoneSearch', 'zoneOptions', 'zone', zonesList, 'Search zone...');
                initSearchableDropdown('cityInput', 'cityDropdown', 'citySearch', 'cityOptions', 'city', citiesList, 'Search city...');
                
                // Set default date to today
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('date').value = today;
                
            } catch (error) {
                console.error('Error loading data:', error);
                showMessage('Failed to load data. Please refresh the page.', 'error');
            }
        }

        async function submitForm(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Submitting...';
            submitBtn.disabled = true;
            
            const formData = {
                agentName: document.getElementById('agentName').value,
                zone: document.getElementById('zone').value,
                city: document.getElementById('city').value,
                date: document.getElementById('date').value,
                visited: parseInt(document.getElementById('visited').value) || 0,
                leaflets: parseInt(document.getElementById('leaflets').value) || 0,
                opened: parseInt(document.getElementById('opened').value) || 0,
                notOpened: parseInt(document.getElementById('notOpened').value) || 0,
                kyc: parseInt(document.getElementById('kyc').value) || 0,
                notes: document.getElementById('notes').value
            };
            
            // Validate
            if (!formData.agentName) {
                showMessage('Please select an agent', 'error');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }
            
            if (!formData.zone) {
                showMessage('Please select a zone', 'error');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }
            
            if (!formData.city) {
                showMessage('Please select a city', 'error');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                showMessage('✅ Entry saved successfully!', 'success');
                
                // Reset form (keep agent, zone, city)
                document.getElementById('visited').value = '0';
                document.getElementById('leaflets').value = '0';
                document.getElementById('opened').value = '0';
                document.getElementById('notOpened').value = '0';
                document.getElementById('kyc').value = '0';
                document.getElementById('notes').value = '';
                
            } catch (error) {
                console.error('Submit error:', error);
                showMessage('Error saving data. Please try again.', 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 4000);
        }
        
        document.getElementById('entryForm').addEventListener('submit', submitForm);
        window.onload = loadData;
    </script>
</body>
</html>
