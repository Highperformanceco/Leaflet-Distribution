<body>
  <div class="form-container">
    <h2>
      📋 Leaflet Distribution
      <span>Agent</span>
    </h2>
    
    <div class="info-box">
      <p>🎯 <strong>Target:</strong> 10 Visits & 10 KYC per day</p>
    </div>
    
    <div class="form-group">
      <label>👤 Agent Name *</label>
      <select id="agentName" required>
        <option value="">Loading agents...</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>📍 Zone</label>
      <input type="text" id="zone" readonly placeholder="Will auto-fill">
    </div>
    
    <div class="form-group">
      <label>📅 Date *</label>
      <input type="date" id="date" required value="<?php echo date('Y-m-d'); ?>">
    </div>
    
    <div class="stats-row">
      <div class="form-group">
        <label>🏠 Places Visited *</label>
        <input type="number" id="visited" min="0" step="1" required placeholder="0">
      </div>
      
      <div class="form-group">
        <label>📄 Leaflets *</label>
        <input type="number" id="leaflets" min="0" step="1" required placeholder="0">
      </div>
    </div>
    
    <div class="stats-row">
      <div class="form-group">
        <label>🚪 Opened Door *</label>
        <input type="number" id="opened" min="0" step="1" required placeholder="0">
      </div>
      
      <div class="form-group">
        <label>🚫 Didn't Open *</label>
        <input type="number" id="notOpened" min="0" step="1" required placeholder="0">
      </div>
    </div>
    
    <div class="form-group">
      <label>✅ KYC Completed *</label>
      <input type="number" id="kyc" min="0" step="1" required placeholder="0">
    </div>
    
    <div class="form-group">
      <label>📝 Notes (Optional)</label>
      <textarea id="notes" rows="3" placeholder="Any observations..."></textarea>
    </div>
    
    <button id="submitBtn" onclick="submitForm()">📤 Submit Entry</button>
    <div id="status"></div>
  </div>

  <script>
    // ===========================================
    // YOUR APPS SCRIPT URL
    // ===========================================
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyhM9yzpkeQlDc6km2OvABI3hHfFgaOYg9h5WQse8GRmmkV51wBSkisfBKrI7MEAoB51w/exec';
    
    // Set today's date as default
    document.getElementById('date').valueAsDate = new Date();
    
    // Load agents when page opens
    window.onload = loadAgents;
    
    async function loadAgents() {
      try {
        const response = await fetch(APPS_SCRIPT_URL + '?action=getAgents');
        const agents = await response.json();
        
        const select = document.getElementById('agentName');
        select.innerHTML = '<option value="">Select your name</option>';
        
        agents.forEach(agent => {
          const option = document.createElement('option');
          option.value = agent.name;
          option.setAttribute('data-teamlead', agent.teamLead);
          option.setAttribute('data-zone', agent.zone);
          option.textContent = `${agent.name} (${agent.zone})`;
          select.appendChild(option);
        });
        
      } catch (error) {
        console.error('Error loading agents:', error);
        document.getElementById('agentName').innerHTML = '<option value="">Error loading agents</option>';
      }
    }
    
    // Auto-fill zone when agent selected
    document.getElementById('agentName').addEventListener('change', function() {
      const selected = this.options[this.selectedIndex];
      const zone = selected.getAttribute('data-zone') || '';
      document.getElementById('zone').value = zone;
    });
    
    async function submitForm() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      
      // Get selected agent data
      const agentSelect = document.getElementById('agentName');
      const selectedOption = agentSelect.options[agentSelect.selectedIndex];
      
      const formData = {
        agentName: agentSelect.value,
        teamLead: selectedOption.getAttribute('data-teamlead') || '',
        zone: document.getElementById('zone').value,
        date: document.getElementById('date').value,
        visited: parseInt(document.getElementById('visited').value) || 0,
        leaflets: parseInt(document.getElementById('leaflets').value) || 0,
        opened: parseInt(document.getElementById('opened').value) || 0,
        notOpened: parseInt(document.getElementById('notOpened').value) || 0,
        kyc: parseInt(document.getElementById('kyc').value) || 0,
        notes: document.getElementById('notes').value
      };
      
      // Validate
      if (!formData.agentName) {
        showStatus('Please select your name', 'error');
        btn.disabled = false;
        return;
      }
      
      if (!formData.date) {
        showStatus('Please select date', 'error');
        btn.disabled = false;
        return;
      }
      
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(formData)
        });
        
        const result = await response.json();
        
        if (result.success) {
          showStatus('✅ Entry saved successfully!', 'success');
          // Reset form
          document.getElementById('visited').value = '';
          document.getElementById('leaflets').value = '';
          document.getElementById('opened').value = '';
          document.getElementById('notOpened').value = '';
          document.getElementById('kyc').value = '';
          document.getElementById('notes').value = '';
          document.getElementById('agentName').value = '';
          document.getElementById('zone').value = '';
        } else {
          showStatus('❌ Error: ' + result.error, 'error');
        }
      } catch (error) {
        showStatus('❌ Submission failed: ' + error.message, 'error');
      }
      
      btn.disabled = false;
    }
    
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = type;
      setTimeout(() => {
        status.textContent = '';
        status.className = '';
      }, 5000);
    }
  </script>
</body>
